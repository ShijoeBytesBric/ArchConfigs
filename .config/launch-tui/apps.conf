# ~/.config/launch-tui/apps.conf
#
# Format:  app.key = value
#
# Keys:
#   command    binary to run          (optional — defaults to the app name)
#   pre_hook   run before launching   (optional — repeat for multiple)
#   namespace  app-id prefix          (optional — defaults to org.omarchy)
# ─────────────────────────────────────────────────────────────────────────────


# Wifi
wifi.command  = impala
wifi.pre_hook = rfkill unblock wifi

# Bluetooth
bluetooth.command = bluetui
bluetooth.pre_hook = rfkill unblock bluetooth

# Btop
btop.command = btop
