general {
    lock_cmd = pidof hyprlock || hyprlock        # don't spawn multiple hyprlock
    before_sleep_cmd = loginctl lock-session      # lock before suspend
    after_sleep_cmd = hyprctl dispatch dpms on   # wake screen after resume
}

listener {
    timeout = 150                                 # 2.5 min: dim screen
    on-timeout = brightnessctl -s set 10
    on-resume = brightnessctl -r
}

listener {
    timeout = 300                                 # 5 min: lock screen
    on-timeout = loginctl lock-session
}

listener {
    timeout = 360                                 # 6 min: screen off
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

listener {
    timeout = 600                                 # 10 min: suspend
    on-timeout = systemctl suspend
}
